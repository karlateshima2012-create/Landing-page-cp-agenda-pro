name: Hostinger Deploy

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.VPS_SSH_KEY }}
          known_hosts: unnecessary
          config: |
            Host vps
              HostName 76.13.209.192
              User root
              Port 22
              StrictHostKeyChecking no
              
      - name: Deploy with rsync
        run: rsync -avz --delete dist/ root@76.13.209.192:/var/www/saibamaiscpagendapro/
